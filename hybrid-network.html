<!DOCTYPE HTML>
<html>
	<head>
		<title>Research Theme - NeQsus Lab</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css?v=17" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<style>
			/* --- CUSTOM FULL-WIDTH BANNER --- */
			.theme-banner {
				position: relative;
				width: 100%;
				height: 400px;
				background-size: cover;
				background-position: center;
				display: flex;
				align-items: center;
				justify-content: center;
				border-radius: 8px 8px 0 0; 
				margin-bottom: 0;
			}
			
			/* Dark overlay to make the white text pop */
			.theme-banner::before {
				content: '';
				position: absolute;
				top: 0; left: 0; right: 0; bottom: 0;
				background: rgba(0, 0, 0, 0.55); 
				border-radius: 8px 8px 0 0;
			}
			
			/* Theme Title on the banner */
			.theme-banner h1 {
				position: relative;
				color: #ffffff !important;
				font-size: 2.5em;
				font-weight: 600;
				z-index: 1;
				text-align: center;
				padding: 0 1em;
				margin: 0;
			}

			/* --- BACK TO RESEARCH BUTTON (SMALL BOX) --- */
			.back-box {
				display: inline-block;
				background-color: #f4f4f4;
				color: #0033a0 !important;
				padding: 8px 16px;
				margin-bottom: 2em;
				border-radius: 4px;
				text-decoration: none !important;
				border: 1px solid #ddd;
				font-size: 0.9em;
				font-weight: 600;
				transition: background-color 0.2s ease;
			}
			.back-box:hover {
				background-color: #e9e9e9;
			}

			/* Clean up the main text area */
			#main {
				border-top-left-radius: 0;
				border-top-right-radius: 0;
			}
			
			.align-left { text-align: left !important; }
			
			@media screen and (max-width: 736px) {
				.theme-banner { height: 250px; }
				.theme-banner h1 { font-size: 1.8em; }
			}
		</style>
	</head>
	<body class="is-preload">

			<div id="wrapper">
			
					<header class="theme-banner" style="background-image: url('images/Hybrid_network.png');">
						<h1>Hybrid quantum network</h1>
					</header>

					<div id="main">
							<section class="main align-left">
								
								<a href="research.html" class="back-box">← Back to Research</a>
								
								<p style="font-size: 1.1em; line-height: 1.8;">
									Will be updated soon!
								</p>
								
							</section>
					</div>

					<footer id="footer">
						<p class="copyright">&copy; Untitled. Design: <a href="https://html5up.net">HTML5 UP</a>.</p>
					</footer>
			</div>

			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.scrollex.min.js"></script>
			<script src="assets/js/jquery.scrolly.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>

	</body>
</html>
